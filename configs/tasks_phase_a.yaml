# 20 EB-Habitat tasks for Phase A.
# We target eval_set "base" — the simplest subset — and pick 20 of its
# episodes. Episode IDs are indices into the loaded pickle; the exact
# mapping depends on the dataset file and will be populated once the
# EB-Habitat install lands on rtx (see runner.py:TODO).
#
# Keep this list stable across runs for reproducibility.

