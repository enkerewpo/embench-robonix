# 20 EB-Habitat tasks from the 'common_sense' eval set — Phase A extension.
# Mirrors tasks_phase_a.yaml (base). EMBENCH_EVAL_SET must match the
# eval_set field below when invoking run_phase_a.sh.
#
# Paper (EmbodiedBench Table 2) reports on 50 episodes/subset; we use
# the first 20 to keep one pass tractable. Same episode IDs across runs
# so SR comparisons are on the exact same task set.

